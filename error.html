<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 - Reels Bundles</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-Rounded;
font-family:'Poppins',sans-serif;
}

body{
height:150vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(-45deg,#ff00cc,#3333ff,#00c6ff,#ff0080);
background-size: 50% 100%;
animation:bg 12s infinite alternate;
color:white;
padding:20px;
}

@keyframes bg{
0%{background-position:0% 50%}
100%{background-position:100% 50%}
}

/* container */
.container{
position:relative;
padding:35px;
width:100%;
max-width:550px;
text-align:center;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(15px);
border-radius:25px;
overflow:hidden;
box-shadow:0 20px 50px rgba(0,0,0,0.6);
}

h1{
font-size:90px;
margin:10px 0;
color:#000; /* black text */

text-shadow:
0 0 5px #ff00cc,
0 0 10px #ff00cc,
0 0 20px #3333ff,
0 0 30px #00c6ff,
0 0 40px #ff0080;

animation:rgbGlow 4s linear infinite;
}

@keyframes rgbGlow{

0%{
text-shadow:
0 0 5px #ff00cc,
0 0 10px #ff00cc,
0 0 20px #3333ff,
0 0 30px #00c6ff;
}

50%{
text-shadow:
0 0 5px #00c6ff,
0 0 10px #00c6ff,
0 0 20px #ff0080,
0 0 30px #3333ff;
}

100%{
text-shadow:
0 0 5px #ff00cc,
0 0 10px #ff00cc,
0 0 20px #3333ff,
0 0 30px #00c6ff;
}

}
}/* RGB border */

.container:before{
content:"";
position:absolute;
top:-2px;
left:-2px;
right:-2px;
bottom:-2px;
background:linear-gradient(45deg,#ff00cc,#3333ff,#00c6ff,#ff0080);
background-size:400%;
z-index:-1;
animation:border 6s linear infinite;
}
@keyframes border{
0%{background-position:0%}
100%{background-position:400%}
}

/* title */

h1{
font-size:110px;
margin:10px 0;
color:#00eaff;
text-shadow:
0 0 10px #00eaff,
0 0 25px #00eaff,
0 0 45px #00eaff;
}

h2{
font-weight:500;
font-size:28px;
}

/* gif */
.video{
width:100%;
max-width:380px;
margin:20px auto;
display:block;
border-radius:15px;
}


/* text */

p{
opacity:0.9;
font-size:18px;
}

.note{
background:#ffffff20;
padding:15px;
border-radius:12px;
margin-top:15px;
font-size:16px;
}

/* button */

.btn{
display:inline-block;
margin-top:25px;
padding:14px 35px;
border-radius:30px;
background:linear-gradient(90deg,#ff00cc,#3333ff);
color:white;
text-decoration:none;
font-weight:500;
transition:0.3s;
box-shadow:0 0 20px rgba(255,0,200,0.8);
}

.btn:hover{
transform:scale(1.1);
box-shadow:0 0 30px rgba(255,0,200,1);
}

.small{
font-size:14px;
opacity:0.7;
margin-top:20px;
}

/* mobile */

@media(max-width:600px){

h1{
font-size:70px;
}

h2{
font-size:22px;
}

.video{
max-width:320px;
}

}

</style>
</head>

<body>

<div class="container">

<h2>Kaha Aa Gaye Dost? 😅</h2>

<h1>404</h1>

<img src="404.gif" class="video">

<p>Dimag Ka Kuch Jada Use Kar Liye Apne ( ͡° ͜ʖ ͡° )</p>

<div class="note">
Sir Ji, link ko copy-paste mat kariye, pehle Payment kariye aur phir Reels Bundles enjoy kariye!
</div>

<a href="index.html" class="btn">⬅ Back to Home</a>

<p class="small">Made with ❤️ for Reels Bundles</p>

</div>
<footer>
Copyright © Reels Bundles
</footer>

<script>

// CTRL+U BLOCK
document.addEventListener('keydown', function(e) {

if (e.ctrlKey && e.key.toLowerCase() === 'u') {
e.preventDefault();
alert("⚠ Source code view is disabled!");
return false;
}

if (e.key === "F12") {
e.preventDefault();
return false;
}

if (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === 'i') {
e.preventDefault();
return false;
}

if (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === 'j') {
e.preventDefault();
return false;
}

});

</script>

</body>
</html>
