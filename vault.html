<!DOCTYPE html>
<html>

<head>
<script>

// access check
if(localStorage.getItem("vaultAccess") !== "granted"){
location.href="error.html";
}

// direct link block
if(!document.referrer.includes("download.html")){
location.href="error.html";
}

</script>


<title>Reels Bundles Vault</title>

<style>

body{
font-family:Arial;
background:#020617;
color:white;
text-align:center;
}

#search{
padding:10px;
width:60%;
border-radius:8px;
border:none;
margin:20px;
}

.file{
background:#1e293b;
padding:15px;
margin:10px;
border-radius:10px;
display:flex;
justify-content:space-between;
width:70%;
margin-left:auto;
margin-right:auto;
}

a{
color:#38bdf8;
text-decoration:none;
}

</style>

</head>

<body>

<h1>📚 Reels Bundle PDF Vault</h1>
  
<div id="pdfList"></div>


<script>

const files = [
"Reels Bundles.pdf"
]

const container=document.getElementById("pdfList")

function showFiles(list){

container.innerHTML=""

list.forEach(file=>{

container.innerHTML+=`
<div class="file">

<span>${file}</span>

<div>
<a href="Reels Bundles.pdf" download>Download</a>
</div>

</div>
`

})

}

showFiles(files)

document.getElementById("search").addEventListener("keyup",function(){

let value=this.value.toLowerCase()

let filtered=files.filter(file=>file.toLowerCase().includes(value))

showFiles(filtered)

})

</script>
<script>
localStorage.removeItem("vaultAccess");
</script>
<div id="timer" style="
position:fixed;
top:10px;
right:20px;
background:black;
color:#00ffff;
padding:8px 14px;
border-radius:8px;
font-family:Arial;
font-size:14px;
box-shadow:0 0 10px #00ffff;
z-index:9999;">
Access Time: 10:00
</div>

<script>

let time = 600;

const timer = setInterval(function(){

let minutes = Math.floor(time/60);
let seconds = time%60;

seconds = seconds < 10 ? "0"+seconds : seconds;

document.getElementById("timer").innerText =
"Access Time: "+minutes+":"+seconds;

time--;

if(time < 0){
clearInterval(timer);
localStorage.removeItem("vaultAccess");
location.href="error.html";
}

},1000);

</script>
</body>
</html>
