<!DOCTYPE html>
<html>

<head>
<title>Enter Access Code</title>

<style>

body{
font-family:Arial;
background:#020617;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:#1e293b;
padding:40px;
border-radius:12px;
text-align:center;
width:350px;
}

input{
width:90%;
padding:10px;
border:none;
border-radius:8px;
margin-top:10px;
}

button{
margin-top:15px;
padding:10px 20px;
border:none;
border-radius:8px;
background:#2563eb;
color:white;
cursor:pointer;
}

.note{
font-size:13px;
margin-top:15px;
color:#94a3b8;
}

</style>

</head>

<body>

<div class="box">

<h2>Enter Your Access Code</h2>

<input type="text" id="code" placeholder="Enter Access Code">

<br>

<button onclick="verify()">Open Vault</button>

<p class="note">
📩 Your access code will be sent to your email within 10 minutes.<br>
Please do not exit this page.
</p>

</div>

<script>

const validCodes=[
"Reels123",
"Reels456",
"Reels789"
]

function verify(){

let code=document.getElementById("code").value

if(validCodes.includes(code)){

sessionStorage.setItem("vaultAccess","yes")

window.location.href="vault.html"

}else{

alert("Invalid Code")

}

}

</script>

</body>
</html>
