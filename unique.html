<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title>Vault Access</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{

height:100vh;
display:flex;
justify-content:center;
align-items:center;

background:linear-gradient(135deg,#020617,#0f172a,#1e293b);

color:white;

}

.container{

background:rgba(255,255,255,0.05);
backdrop-filter:blur(12px);

padding:40px;

border-radius:15px;

width:360px;

text-align:center;

box-shadow:0 0 30px rgba(0,0,0,0.6);

}

h1{

margin-bottom:10px;
font-size:26px;

}

.sub{

font-size:14px;
color:#94a3b8;
margin-bottom:20px;

}

input{

width:100%;

padding:12px;

border:none;

border-radius:8px;

margin-top:10px;

background:#020617;

color:white;

outline:none;

}

button{

width:100%;

padding:12px;

margin-top:15px;

border:none;

border-radius:8px;

background:#2563eb;

color:white;

font-size:16px;

cursor:pointer;

transition:0.3s;

}

button:hover{

background:#1d4ed8;

}

.note{

margin-top:18px;

font-size:13px;

color:#94a3b8;

}

</style>

</head>

<body>

<div class="container">

<h1>🔐 Vault Access</h1>

<p class="sub">Enter your unique access code</p>

<input type="text" id="code" placeholder="Enter Code">

<button onclick="verify()">Open Vault</button>

<p class="note">

📩 Your access code will be sent to your email within 10 minutes.<br>
Please do not exit this page.

</p>

</div>

<script>

const validCodes=[
"Reels123",
"Reels456",
"Reels678"
]

function verify(){

let code=document.getElementById("code").value

if(validCodes.includes(code)){

sessionStorage.setItem("vaultAccess","yes")

window.location.href="vault.html"

}else{

alert("Invalid Access Code")

}

}

</script>

</body>

</html>
