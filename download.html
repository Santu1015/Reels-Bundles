<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Download Ready</title>

<script>
localStorage.setItem("downloadAccess","yes");
</script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI, sans-serif;
}

body{

min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
padding:20px;

background:linear-gradient(270deg,#6a11cb,#2575fc,#ff6a00);
background-size:600% 600%;
animation:bg 12s infinite alternate;

}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.card{

width:100%;
max-width:420px;
padding:45px 35px;
border-radius:22px;

background:rgba(255,255,255,0.15);
backdrop-filter:blur(15px);

text-align:center;
color:white;

box-shadow:0 15px 50px rgba(0,0,0,0.5);

animation:fade 1s ease;

}

@keyframes fade{

from{
opacity:0;
transform:translateY(30px);
}

to{
opacity:1;
transform:translateY(0);
}

}

.icon{

font-size:70px;
margin-bottom:15px;
animation:float 3s ease-in-out infinite;

}

@keyframes float{
0%,100%{transform:translateY(0)}
50%{transform:translateY(-10px)}
}

h1{

margin-bottom:10px;
font-size:28px;

}

p{

font-size:15px;
margin-bottom:25px;
opacity:0.9;

}

.btn{

display:inline-block;
padding:15px 40px;

border-radius:40px;
text-decoration:none;

font-weight:bold;

color:white;
background:linear-gradient(45deg,#ff512f,#dd2476);

transition:.3s;

box-shadow:0 8px 20px rgba(0,0,0,0.4);

}

.btn:hover{

transform:scale(1.08);
box-shadow:0 15px 30px rgba(0,0,0,0.5);

}

.timer{

margin-top:20px;
font-size:14px;
opacity:0.8;

}

.footer{

margin-top:auto;
text-align:center;
font-size:13px;
color:white;
opacity:0.7;
padding:20px;

}

/* MOBILE */

@media (max-width:600px){

.card{

padding:35px 22px;

}

.icon{

font-size:55px;

}

h1{

font-size:22px;

}

.btn{

width:100%;

}

}

</style>

</head>

<body>

<div class="card">

<div class="icon">⬇️</div>

<h1>Download Ready</h1>

<p>Your product is ready to download.<br>
Click below or wait for automatic download.</p>

<a href="warning.html?access=yes" class="btn">
Download Now
</a>

<div class="timer">
Auto download in <span id="count">10</span> seconds
</div>

</div>

<div class="footer">
© 2026 Reels Bundles • All Rights Reserved
</div>

<script>

let time=10;

let timer=setInterval(function(){

time--;

document.getElementById("count").innerText=time;

if(time==0){

clearInterval(timer);
window.location.href="warning.html?access=yes";

}

},1000);

</script>

</body>
</html>
