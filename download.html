<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Download Your Product</title>
<script>
localStorage.setItem("vaultAccess","granted");
</script>
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI;
}

body{
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
background:linear-gradient(270deg,#6a11cb,#2575fc,#ff6a00);
background-size:600% 600%;
animation:bgAnimation 12s infinite alternate;
}

@keyframes bgAnimation{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.card{
width:380px;
padding:40px;
border-radius:20px;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(15px);
text-align:center;
color:white;
box-shadow:0 10px 40px rgba(0,0,0,0.4);
animation:fade 1s ease;
}

@keyframes fade{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;transform:translateY(0);}
}

.icon{
font-size:70px;
margin-bottom:10px;
animation:float 3s ease-in-out infinite;
}

@keyframes float{
0%,100%{transform:translateY(0)}
50%{transform:translateY(-10px)}
}

h1{
margin-bottom:10px;
}

p{
font-size:14px;
margin-bottom:25px;
opacity:0.9;
}

.btn{
display:inline-block;
padding:15px 35px;
border-radius:40px;
text-decoration:none;
font-weight:bold;
color:#2575fc;
background:white;
transition:0.3s;
box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

.btn:hover{
transform:scale(1.1);
box-shadow:0 10px 25px rgba(0,0,0,0.5);
}

.timer{
margin-top:20px;
font-size:13px;
opacity:0.8;
}
.footer{
margin-top:30px;
font-size:12px;
opacity:0.6;
}
.site-footer{
text-align:center;
color:white;
font-size:14px;
margin-top:auto;
padding:20px 0;
}
</style>

</head>

<body>

<div class="card">

<div class="icon">⬇️</div>

<h1>Download Ready</h1>

<p>Your product is ready to download.<br>
Click below or wait for automatic download.</p>

<a href="vault.html?access=yes" class="btn" id="downloadBtn">
Download Now
</a>

<div class="timer">
Auto download in <span id="count">10</span> seconds
</div>

<div class="footer">
Secure Payment ✔ Instant Access
</div>

</div>

<script>

let time = 10;
let count = document.getElementById("count");

let timer = setInterval(function(){

time--;
count.innerText = time;

if(time == 0){

clearInterval(timer);
window.location.href="vault.html?access=yes";

}

},1000);

</script>

<script>

// CTRL+U BLOCK
document.addEventListener('keydown', function(e) {

if (e.ctrlKey && e.key.toLowerCase() === 'u') {
e.preventDefault();
alert("⚠ Source code view is disabled!");
return false;
}

if (e.key === "F12") {
e.preventDefault();
return false;
}

if (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === 'i') {
e.preventDefault();
return false;
}

if (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === 'j') {
e.preventDefault();
return false;
}

});

</script>

<footer class="site-footer">
© 2026 Reels Bundles • All Rights Reserved
</footer>
  
</body>
</html>
